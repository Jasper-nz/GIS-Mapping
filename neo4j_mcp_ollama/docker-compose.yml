services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui-demo
    ports:
      - "8088:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "False"
      ENV: dev
      WEBUI_IFRAME_EMBEDDING: "true"
      ENABLE_IMAGE_GENERATION: "true"
      DEFAULT_USER_ROLE: "user"
      
    volumes:
      - open-webui_demo:/app/backend/data
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: always
    depends_on:
      - neo4j-mcp-server
      #- neo4j
      - ollama
  
  #neo4j:
    #image: neo4j
    #container_name: neo4j
    #ports:
      #- "7474:7474"
      #- "7687:7687"
    #environment:
      #NEO4J_AUTH: neo4j/12345678
      #NEO4J_dbms_memory_pagecache_size: 1G
      #NEO4J_dbms_memory_heap_initial__size: 2G
      #NEO4J_dbms_memory_heap_max__size: 2G
    #volumes:
      #- ./volumes/neo4j:/data
    #extra_hosts:
      #- host.docker.internal:host-gateway
    #restart: always


  semantic-search:
    image: mcp_semantic_search:latest
    container_name: mcp-semantic-search
    ports:
      - "8001:8001"
      - "9000:9000"
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - open-webui
    restart: always

  neo4j-mcp-server:
    image: neo4j-mcp-server:latest
    container_name: neo4j-mcp-server
    ports:
      - "8000:8000"
    extra_hosts:
      - host.docker.internal:host-gateway
    #depends_on:
      #- neo4j
    restart: always

  neo4j-mcp-memory:
    image: neo4j-mcp_memory:latest
    container_name: neo4j-mcp-memory
    ports:
      - "8002:8002"
    extra_hosts:
      - host.docker.internal:host-gateway
    #depends_on:
      #- neo4j
    restart: always

  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            capabilities: ["gpu"]
            #device_ids: ["1", "2"]
            count: all

volumes:
  open-webui_demo:
  ollama:
